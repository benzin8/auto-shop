{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">Редактирование товара: {{ product.name }}</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('dashboard.edit_product', product_id=product.id) }}" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Название товара</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="sku" class="form-label">Артикул (SKU)</label>
                                <input type="text" class="form-control" id="sku" name="sku" value="{{ product.sku }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Цена (руб.)</label>
                                <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ product.price }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="brand_id" class="form-label">Бренд</label>
                                <select class="form-select" id="brand_id" name="brand_id" required>
                                    {% for brand in brands %}
                                        <option value="{{ brand.id }}" {% if brand.id == product.brand_id %}selected{% endif %}>
                                            {{ brand.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="category_id" class="form-label">Категория</label>
                                <select class="form-select" id="category_id" name="category_id" required>
                                    {% for category in categories %}
                                        <option value="{{ category.id }}" {% if category.id == product.category_id %}selected{% endif %}>
                                            {{ category.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <textarea class="form-control" id="description" name="description" rows="5">{{ product.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="image" class="form-label">Изображение товара</label>
                            <input type="file" class="form-control" id="image" name="image" accept="image/*">
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('shop.index') }}" class="btn btn-outline-secondary">Отмена</a>
                            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
