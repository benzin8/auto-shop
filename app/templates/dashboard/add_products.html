{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Карточка нового товара</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('dashboard.add_product') }}" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Название товара</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="Например: Свеча зажигания" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="sku" class="form-label">Артикул (SKU)</label>
                            <input type="text" class="form-control" id="sku" name="sku" placeholder="Уникальный код" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="brand_id" class="form-label">Бренд</label>
                            <select class="form-select" id="brand_id" name="brand_id" required>
                                <option value="" selected disabled>Выберите бренд...</option>
                                {% for brand in brands %}
                                    <option value="{{ brand.id }}">{{ brand.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category_id" class="form-label">Категория</label>
                            <select class="form-select" id="category_id" name="category_id" required>
                                <option value="" selected disabled>Выберите категорию...</option>
                                {% for cat in categories %}
                                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Цена (руб.)</label>
                        <input type="number" step="0.01" class="form-control" id="price" name="price" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="image" class="form-label">Изображение товара</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('shop.index') }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-success">Сохранить товар</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
